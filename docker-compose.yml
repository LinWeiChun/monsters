services:
  mysql:
    image: mysql:8.4
    container_name: monsters-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-monsters}
      MYSQL_USER: ${MYSQL_USER:-monsters}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-monsters}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Taipei
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: monsters-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-monsters}?useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true
      DB_USERNAME: ${MYSQL_USER:-monsters}
      DB_PASSWORD: ${MYSQL_PASSWORD:-monsters}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

volumes:
  mysql_data:
